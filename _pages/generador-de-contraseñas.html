<div class="pg-wrapper">

  <!-- Longitud -->
  <div class="pg-field">
    <div class="pg-field__header">
      <span class="pg-field__label">Longitud de la contraseña</span>
      <span class="pg-field__value" id="pg-length-display">16</span>
    </div>
    <div class="pg-field__slider-row">
      <input type="range" class="pg-slider" id="pg-length-slider" min="4" max="64" value="16">
      <input type="number" class="pg-number" id="pg-length" min="4" max="64" value="16">
    </div>
  </div>

  <!-- Opciones -->
  <div class="pg-options">
    <label class="pg-toggle">
      <input type="checkbox" id="pg-uppercase" checked>
      <span class="pg-toggle__track"><span class="pg-toggle__thumb"></span></span>
      <span class="pg-toggle__label">Mayúsculas (A-Z)</span>
    </label>
    <label class="pg-toggle">
      <input type="checkbox" id="pg-lowercase" checked>
      <span class="pg-toggle__track"><span class="pg-toggle__thumb"></span></span>
      <span class="pg-toggle__label">Minúsculas (a-z)</span>
    </label>
    <label class="pg-toggle">
      <input type="checkbox" id="pg-numbers" checked>
      <span class="pg-toggle__track"><span class="pg-toggle__thumb"></span></span>
      <span class="pg-toggle__label">Números (0-9)</span>
    </label>
    <label class="pg-toggle">
      <input type="checkbox" id="pg-special">
      <span class="pg-toggle__track"><span class="pg-toggle__thumb"></span></span>
      <span class="pg-toggle__label">Caracteres especiales (!@#$%...)</span>
    </label>
    <label class="pg-toggle">
      <input type="checkbox" id="pg-no-ambiguous">
      <span class="pg-toggle__track"><span class="pg-toggle__thumb"></span></span>
      <span class="pg-toggle__label">Excluir ambiguos (0, O, l, 1, I)</span>
    </label>
  </div>

  <!-- Botón generar -->
  <button class="pg-btn" onclick="pgGeneratePassword()">Generar contraseña</button>

  <!-- Resultado -->
  <div class="pg-result" id="pg-result">
    <span class="pg-password" id="pg-password"></span>
    <button class="pg-copy-btn" id="pg-copy-btn" onclick="pgCopyPassword()" title="Copiar contraseña">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
      </svg>
    </button>
  </div>

  <!-- Indicador de seguridad -->
  <div class="pg-strength" id="pg-strength">
    <div class="pg-strength__bar">
      <div class="pg-strength__fill" id="pg-strength-fill"></div>
    </div>
    <span class="pg-strength__text" id="pg-strength-text"></span>
  </div>

</div>

<style>
.pg-wrapper {
  max-width: 520px;
  margin: 0 auto;
  padding: 32px;
  background: var(--background-alt-color);
  border: 1px solid var(--border-color);
  border-radius: 12px;
}

/* Longitud */
.pg-field {
  margin-bottom: 24px;
}

.pg-field__header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.pg-field__label {
  font-weight: 700;
  color: var(--heading-font-color);
}

.pg-field__value {
  font-size: 22px;
  font-weight: 700;
  color: var(--brand-color);
  min-width: 32px;
  text-align: right;
}

.pg-field__slider-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.pg-slider {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  border-radius: 4px;
  background: var(--border-color);
  outline: none;
  cursor: pointer;
}

.pg-slider::-webkit-slider-runnable-track {
  height: 4px;
  border-radius: 4px;
  background: #c5d0e6;
}

.pg-slider::-moz-range-track {
  height: 4px;
  border-radius: 4px;
  background: #c5d0e6;
}

:root[dark] .pg-slider::-webkit-slider-runnable-track,
:root[dark] .pg-slider::-moz-range-track {
  background: #3a3d47;
}

.pg-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--brand-color);
  cursor: pointer;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}

.pg-slider::-moz-range-thumb {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--brand-color);
  cursor: pointer;
  border: none;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}

.pg-number {
  width: 62px;
  padding: 6px 8px;
  font-size: 15px;
  font-weight: 600;
  text-align: center;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  background: var(--background-color);
  color: var(--heading-font-color);
}

/* Opciones */
.pg-options {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 28px;
  padding: 20px;
  background: var(--background-color);
  border: 1px solid var(--border-color);
  border-radius: 8px;
}

.pg-toggle {
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  user-select: none;
}

.pg-toggle input[type="checkbox"] {
  display: none;

  position: relative;

.pg-toggle__label {

  color: var(--heading-font-color);
}

/* Botón */
.pg-btn {
  display: block;
  width: 100%;
  padding: 14px;
  font-size: 16px;
  font-weight: 700;
  background: var(--brand-color);
  color: #fff;

  border-radius: 8px;

  margin-bottom: 20px;
}

.pg-btn:hover {
  opacity: 0.85;
}

/* Resultado */
.pg-result {
  display: none;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--background-color);
  border: 1px solid var(--border-color);

  margin-bottom: 14px;

.pg-result.is-visible {
  display: flex;
}

  font-family: monospace;
  font-size: 16px;
  word-break: break-all;

  flex: 1;

}

.pg-copy-btn {
  background: none;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 6px 8px;
  cursor: pointer;
  color: var(--heading-font-color);
  display: flex;
  align-items: center;
  transition: background .2s ease, color .2s ease, border-color .2s ease;
  flex-shrink: 0;
}

.pg-copy-btn:hover {
  background: var(--brand-color);
  color: #fff;
  border-color: var(--brand-color);
}

  background: #22c55e;
  color: #fff;
  border-color: #22c55e;
}

/* Indicador de seguridad */
.pg-strength {
  display: none;
}

.pg-strength.is-visible {
  display: block;
}

.pg-strength__bar {
  height: 5px;
  background: var(--border-color);
  border-radius: 5px;
  overflow: hidden;
  margin-bottom: 6px;
}

.pg-strength__fill {
  height: 100%;
  border-radius: 5px;
  transition: width .4s ease, background .4s ease;
}

.pg-strength__text {
  font-size: 13px;
  font-weight: 700;
}
</style>

<script>
(function () {
  var slider = document.getElementById('pg-length-slider');
  var numInput = document.getElementById('pg-length');
  var display = document.getElementById('pg-length-display');

  function syncLength(val) {
    val = Math.min(64, Math.max(4, parseInt(val) || 4));
    slider.value = val;
    numInput.value = val;
    display.textContent = val;
  }

  slider.addEventListener('input', function () { syncLength(this.value); });
  numInput.addEventListener('input', function () { syncLength(this.value); });

  var COPY_ICON = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
  var CHECK_ICON = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

  window.pgGeneratePassword = function () {
    var length = parseInt(document.getElementById('pg-length').value);
    var useUpper = document.getElementById('pg-uppercase').checked;
    var useLower = document.getElementById('pg-lowercase').checked;
    var useNumbers = document.getElementById('pg-numbers').checked;
    var useSpecial = document.getElementById('pg-special').checked;
    var noAmbiguous = document.getElementById('pg-no-ambiguous').checked;

    var charset = '';
    if (useUpper) charset += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    if (useLower) charset += 'abcdefghijklmnopqrstuvwxyz';
    if (useNumbers) charset += '0123456789';
    if (useSpecial) charset += '!@#$%^&*()_+-=[]{}|;:,.<>?';
    if (noAmbiguous) charset = charset.replace(/[0OlI1]/g, '');

    if (!charset) {
      alert('Selecciona al menos una opción.');
      return;
    }

    // Generación criptográficamente segura con crypto.getRandomValues()
    var arr = new Uint32Array(length);
    crypto.getRandomValues(arr);
    var password = '';
    for (var i = 0; i < length; i++) {
      password += charset[arr[i] % charset.length];
    }

    document.getElementById('pg-password').textContent = password;
    document.getElementById('pg-result').classList.add('is-visible');

    var copyBtn = document.getElementById('pg-copy-btn');
    copyBtn.classList.remove('is-copied');
    copyBtn.innerHTML = COPY_ICON;

    pgEvaluateStrength(password);
  };

  window.pgCopyPassword = function () {
    var password = document.getElementById('pg-password').textContent;
    if (!password) return;

    var copyBtn = document.getElementById('pg-copy-btn');

    function onCopied() {
      copyBtn.classList.add('is-copied');
      copyBtn.innerHTML = CHECK_ICON;
      setTimeout(function () {
        copyBtn.classList.remove('is-copied');
        copyBtn.innerHTML = COPY_ICON;
      }, 2000);
    }

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(password).then(onCopied).catch(function () {
        fallbackCopy(password, onCopied);
      });
    } else {
      fallbackCopy(password, onCopied);
    }
  };

  function fallbackCopy(text, callback) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); callback(); } catch (e) {}
    document.body.removeChild(ta);
  }

  function pgEvaluateStrength(password) {
    var score = 0;
    if (password.length >= 8) score++;
    if (password.length >= 12) score++;
    if (password.length >= 16) score++;
    if (password.length >= 24) score++;
    if (/[A-Z]/.test(password)) score++;
    if (/[a-z]/.test(password)) score++;
    if (/[0-9]/.test(password)) score++;
    if (/[^A-Za-z0-9]/.test(password)) score++;

    var fill = document.getElementById('pg-strength-fill');
    var text = document.getElementById('pg-strength-text');
    var strengthEl = document.getElementById('pg-strength');
    strengthEl.classList.add('is-visible');

    var levels = [
      { max: 3, width: '25%', color: '#ef4444', label: 'Débil' },
      { max: 5, width: '50%', color: '#f97316', label: 'Media' },
      { max: 7, width: '75%', color: '#eab308', label: 'Fuerte' },
      { max: 8, width: '100%', color: '#22c55e', label: 'Muy fuerte' }
    ];

    var level = levels.find(function (l) { return score <= l.max; }) || levels[3];
    fill.style.width = level.width;
    fill.style.background = level.color;
    text.style.color = level.color;
    text.textContent = 'Nivel de seguridad: ' + level.label;
  }
})();
</script>
